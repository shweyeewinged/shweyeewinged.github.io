<!DOCTYPE html>
<html lang="en">
<head>

    <title>Table lesson</title>
</head>
<body>
   <h1>Table lesson</h1>

        <tr>
            <td>Mg Mg</td>
            <td>Web Developer</td>
            <td>Yangon</td>
            <td>24</td>
            <td>2020/02/23</td>
            <td>700000</td>
        </tr>
        <tr>
            <td>Ma Ma</td>

            <td>25</td>
            <td>2022/04/05</td>

        </tr>
        <tr>
            <td>Kaung Kaung</td>
            <td>Database Adminstrator</td>
            <td>Mandalay</td>
            <td>29</td>
            <td>2019/05/01</td>
            <td>950000</td>
        </tr>
    </tbody>
    <tfoot>
        <th>Name</th>
            <th>Position</th>
            <th>Office</th>
            <th>Age</th>
            <th>Start date</th>
            <th>Salary</th>
    </tfoot>
   </table>
</body>
</html>
